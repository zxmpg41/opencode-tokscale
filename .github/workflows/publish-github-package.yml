name: Publish GitHub Package

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Configure GitHub Packages registry
        run: |
          printf '@zxmpg41:registry=https://npm.pkg.github.com\n' > .npmrc
          printf '//npm.pkg.github.com/:_authToken=%s\n' "$GITHUB_TOKEN" >> .npmrc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package
        run: bun publish --registry https://npm.pkg.github.com --access public
